services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: onprem-sre-postgres
    environment:
      POSTGRES_DB: sre_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sre_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: onprem-sre-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    container_name: onprem-sre-otel
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./k8s/dev/otel-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
