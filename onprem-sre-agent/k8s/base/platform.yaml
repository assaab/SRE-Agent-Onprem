apiVersion: v1
kind: Namespace
metadata:
  name: onprem-sre-agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-service
  namespace: onprem-sre-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingress-service
  template:
    metadata:
      labels:
        app: ingress-service
    spec:
      containers:
        - name: ingress
          image: onprem-sre-agent/ingress:latest
          ports:
            - containerPort: 8001
          envFrom:
            - secretRef:
                name: onprem-sre-agent-env
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8001
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
---
